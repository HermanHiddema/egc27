- slug: bbq-saturday
  title: BBQ Saturday
  content: Join the traditional Saturday BBQ at the outdoor terrace with vegetarian and halal options, live music, and informal blitz tables until late evening.
- slug: beer-and-go
  title: Beer and Go
  content: A relaxed evening side event with short games, local craft beers, and non-alcoholic tasting flights in the social hall.
- slug: blitz
  title: Blitz
  content: The blitz tournament runs over two evenings with fast time settings and a final stage for top scorers from the preliminary rounds.
- slug: budget-accommodation
  title: Budget Accommodation
  content: Budget stays include hostels, student rooms, and shared apartments within 20 to 35 minutes of the venue by public transport.
- slug: camping
  title: Camping
  content: Camping pitches are available at two nearby sites with direct bus lines to the venue and access to showers, laundry, and quiet hours.
- slug: chess-and-go
  title: Chess and Go
  content: Chess and Go is a mixed-format side tournament where participants alternate games in both disciplines and compete on combined score.
- slug: conference
  title: Conference
  content: The conference day features talks on teaching methods, tournament software, youth development, and AI-assisted review workflows.
- slug: contact
  title: Contact
  content: For general questions, volunteer coordination, or accessibility requests, contact the organizing team and we will respond within two business days.
- slug: egc-rules
  title: EGC Rules
  content: This page summarizes competition format, pairing procedures, byes, tie-breaks, and conduct expectations for all official congress events.
- slug: egf-meeting
  title: EGF Meeting
  content: The EGF annual meeting is open to federation delegates and invited observers, with agenda documents published before the session.
- slug: european-championship
  title: European Championship
  content: The European Championship runs in parallel with the Main Open and follows EGF qualification, pairing, and title regulations.
- slug: excursions-diy-local
  title: DIY Excursions (Local)
  content: Self-guided local routes include museums, historic districts, and waterfront walks, with printable maps and suggested time blocks.
- slug: excursions-diy-out-of-town
  title: DIY Excursions (Out of Town)
  content: Out-of-town DIY ideas cover day trips by train, recommended itineraries, and practical return-time guidance for evening rounds.
- slug: excursions-organised-local
  title: Organised Excursions (Local)
  content: Organised local tours run with guides in English and include transport, entry reservations, and fixed return slots.
- slug: excursions-organised-out-of-town
  title: Organised Excursions (Out of Town)
  content: Organised out-of-town excursions are capacity-limited and require pre-booking, with clear meeting points and backup weather plans.
- slug: exhibitors
  title: Exhibitors
  content: Exhibitor booths include clubs, publishers, boards-and-stones makers, and partner organizations showcasing services and products.
- slug: game-reviews
  title: Game Reviews
  content: Daily review sessions by professionals are scheduled after rounds, with selected board positions and audience Q and A.
- slug: go-coins
  title: Go Coins
  content: Go Coins are the on-site token for meals and selected activities, available in digital form through your participant profile.
- slug: group-photo
  title: Group Photo
  content: The official group photo is scheduled on Sunday morning; please arrive early to help section marshals place everyone efficiently.
- slug: hexgo
  title: Hexgo
  content: HexGo side sessions explore connection-game strategy with quick formats suitable for both beginners and experienced players.
- slug: hotels
  title: Hotels
  content: Partner hotels offer negotiated rates for participants with breakfast options and clear cancellation terms before arrival.
- slug: lectures
  title: Lectures
  content: Lecture tracks cover fuseki trends, endgame fundamentals, practical tsumego, and coaching approaches for youth and adults.
- slug: local-bars
  title: Local Bars
  content: Discover nearby bars and late-evening cafes suitable for post-round meetups, with maps and typical closing times.
- slug: local-restaurants
  title: Local Restaurants
  content: The restaurant guide lists affordable lunch spots, regional cuisine, and allergy-friendly options around the venue.
- slug: main-open
  title: Main Open
  content: The Main Open consists of ten rounds with class prizes and a transparent tie-break system published before round one.
- slug: marathon-13x13
  title: Marathon 13x13
  content: The 13x13 marathon runs as a flexible side event where participants can join throughout the week and accumulate points.
- slug: marathon-9x9
  title: Marathon 9x9
  content: The 9x9 marathon is ideal for quick games between rounds, with rolling standings and daily mini-prizes.
- slug: onsite-meals
  title: Onsite Meals
  content: On-site meals are served at fixed lunch and dinner windows with clearly labeled vegetarian, vegan, and gluten-aware choices.
- slug: opening-ceremony
  title: Opening Ceremony
  content: The opening ceremony welcomes participants, introduces key teams, and provides practical information for the first tournament days.
- slug: other-games
  title: Other Games
  content: Beyond Go, evening tables host social card and board games for mixed groups looking for a lighter competitive format.
- slug: pair-go
  title: Pair Go
  content: Pair Go features mixed pairs and timed rounds focused on teamwork, communication, and creative strategic balance.
- slug: pandanet
  title: Pandanet
  content: Pandanet online activities connect remote and on-site participants with special events and broadcast-friendly game slots.
- slug: participants
  title: Participants
  content: The participants page lists confirmed registrations with country, club, rank, and attendance windows.
- slug: poker
  title: Poker
  content: Friendly poker evenings are organized as social side activities with fixed buy-in limits and beginner-friendly tables.
- slug: prizegivings
  title: Prizegivings
  content: Prize ceremonies are held after key finals and at closing, recognizing tournament winners, volunteers, and community awards.
- slug: rapid
  title: Rapid
  content: The rapid tournament offers shorter rounds during the week and contributes to the all-round side-event leaderboard.
- slug: registration
  title: Registration
  content: Registration includes account confirmation, participant profile completion, and optional side-event enrollment.
- slug: schedule
  title: Schedule
  content: The full congress schedule includes rounds, lectures, excursions, and social events with regular updates as details are finalized.
- slug: senior
  title: Senior
  content: The senior tournament welcomes experienced players in a dedicated format designed for comfortable pacing and fair pairings.
- slug: shops
  title: Shops
  content: The shopping area includes books, clocks, sets, and accessories from local and international Go retailers.
- slug: simultaneous-games
  title: Simultaneous Games
  content: Simultaneous game sessions with invited professionals are available on selected evenings with advance sign-up.
- slug: sponsors
  title: Sponsors
  content: Our sponsors support tournament infrastructure, youth participation, and program quality throughout the congress.
- slug: sport
  title: Sport
  content: Morning and evening sport sessions include light running, stretching, and informal team activities open to all participants.
- slug: teachers
  title: Teachers
  content: Meet the teaching team, browse focus areas, and find available coaching sessions for kyu and dan levels.
- slug: teams
  title: Teams
  content: Team competitions include national and mixed-club formats with standings updated after every round.
- slug: torus-go
  title: Torus Go
  content: Torus Go sessions introduce a variant board geometry and short tournaments for players curious about alternative rule spaces.
- slug: tsume-go
  title: Tsume Go
  content: Tsume Go activities include daily puzzle sheets, coached solving sessions, and a week-ending problem contest.
- slug: tsume-go-activity
  title: Tsume Go Activity
  content: This activity stream focuses on tactical reading drills and guided exercises for all playing strengths.
- slug: venue
  title: Venue
  content: The venue provides large playing halls, analysis corners, quiet zones, and step-free access to all main congress spaces.
- slug: vip-dinner
  title: VIP Dinner
  content: The VIP dinner hosts invited guests, federation delegates, and partner representatives for opening-week networking.
- slug: weekend-tournament
  title: Weekend Tournament
  content: The weekend tournament is a compact five-round event designed for players joining during the middle weekend.
- slug: women
  title: Women
  content: The women tournament features dedicated rounds and recognition prizes while remaining integrated with the congress timetable.
- slug: youth
  title: Youth
  content: Youth tournaments include age-appropriate sections, supervised breaks, and family support information for guardians.